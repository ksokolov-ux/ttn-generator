<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>eTTN JSON Generator ULTRA</title>

<style>

:root{
    --primary:#1a73e8;
    --bg:#f4f7fb;
    --border:#dce3ea;
    --success:#188038;
    --danger:#d93025;
}

body{
    margin:0;
    padding:20px;
    background:var(--bg);
    font-family:Segoe UI,sans-serif;
}

.container{
    max-width:1500px;
    margin:auto;
    background:white;
    border-radius:12px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    color:var(--primary);
    margin-bottom:30px;
}

.section{
    margin-top:25px;
    border:1px solid var(--border);
    border-radius:10px;
    padding:20px;
    background:#fafcff;
}

.section h2{
    margin-top:0;
    color:var(--primary);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:15px;
}

.field{
    display:flex;
    flex-direction:column;
}

label{
    font-size:12px;
    font-weight:600;
    margin-bottom:5px;
    color:#5f6368;
}

input, textarea{
    padding:10px;
    border:1px solid var(--border);
    border-radius:6px;
    font-size:14px;
}

.item-card{
    border:1px solid var(--border);
    border-radius:8px;
    padding:15px;
    margin-bottom:15px;
    background:white;
    position:relative;
}

.remove-btn{
    position:absolute;
    right:10px;
    top:10px;
    background:var(--danger);
    color:white;
    border:none;
    border-radius:5px;
    padding:5px 10px;
    cursor:pointer;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:25px;
}

button{
    border:none;
    border-radius:6px;
    padding:12px 18px;
    font-weight:700;
    cursor:pointer;
}

.btn-primary{
    background:var(--primary);
    color:white;
}

.btn-success{
    background:var(--success);
    color:white;
}

.btn-danger{
    background:var(--danger);
    color:white;
}

#json-output{
    margin-top:30px;
    background:#111827;
    color:#9effa1;
    border-radius:10px;
    padding:20px;
    white-space:pre-wrap;
    overflow:auto;
    max-height:800px;
    font-family:Consolas, monospace;
}

</style>
</head>
<body>

<div class="container">

<h1>📦 eTTN JSON Generator ULTRA</h1>

<!-- DOCUMENT -->

<div class="section">
<h2>1. ExchangedDocument</h2>

<div class="grid">

<div class="field">
<label>ID документа</label>
<input id="doc_id">
</div>

<div class="field">
<label>Дата документа</label>
<input type="datetime-local" id="doc_date">
</div>

<div class="field">
<label>Адреса оформлення</label>
<input id="issue_desc">
</div>

<div class="field">
<label>Вага словами</label>
<input id="weight_text">
</div>

<div class="field">
<label>Сума словами</label>
<input id="amount_text">
</div>

<div class="field">
<label>Кількість місць словами</label>
<input id="qty_text">
</div>

<div class="field">
<label>ПДВ</label>
<input type="number" id="vat_amount">
</div>

<div class="field">
<label>ПДВ словами</label>
<input id="vat_text">
</div>

<div class="field">
<label>Довжина авто</label>
<input type="number" step="0.01" id="truck_length">
</div>

<div class="field">
<label>Ширина авто</label>
<input type="number" step="0.01" id="truck_width">
</div>

<div class="field">
<label>Висота авто</label>
<input type="number" step="0.01" id="truck_height">
</div>

<div class="field">
<label>Маса авто</label>
<input type="number" step="0.01" id="truck_weight">
</div>

</div>
</div>

<!-- CUSTOMER -->

<div class="section">
<h2>2. Замовник</h2>

<div class="grid">

<div class="field">
<label>Назва замовника</label>
<input id="customer_name">
</div>

</div>
</div>

<!-- CONSIGNOR -->

<div class="section">
<h2>3. Вантажовідправник</h2>

<div class="grid">

<div class="field">
<label>Назва</label>
<input id="consignor_name">
</div>

<div class="field">
<label>ЄДРПОУ</label>
<input id="consignor_id">
</div>

</div>
</div>

<!-- CONSIGNEE -->

<div class="section">
<h2>4. Вантажоотримувач</h2>

<div class="grid">

<div class="field">
<label>Назва</label>
<input id="consignee_name">
</div>

<div class="field">
<label>ЄДРПОУ</label>
<input id="consignee_id">
</div>

</div>
</div>

<!-- CARRIER -->

<div class="section">
<h2>5. Перевізник</h2>

<div class="grid">

<div class="field">
<label>Назва</label>
<input id="carrier_name">
</div>

<div class="field">
<label>ЄДРПОУ</label>
<input id="carrier_id">
</div>

<div class="field">
<label>Ліцензія</label>
<input id="carrier_license">
</div>

</div>
</div>

<!-- LOCATIONS -->

<div class="section">
<h2>6. Локації</h2>

<div class="grid">

<div class="field">
<label>Точка завантаження</label>
<input id="load_name">
</div>

<div class="field">
<label>Адреса завантаження</label>
<input id="load_desc">
</div>

<div class="field">
<label>Точка розвантаження</label>
<input id="unload_name">
</div>

<div class="field">
<label>Адреса розвантаження</label>
<input id="unload_desc">
</div>

</div>
</div>

<!-- TRUCK -->

<div class="section">
<h2>7. Авто</h2>

<div class="grid">

<div class="field">
<label>Номер авто</label>
<input id="truck_id">
</div>

<div class="field">
<label>Марка</label>
<input id="truck_brand">
</div>

<div class="field">
<label>Модель</label>
<input id="truck_model">
</div>

</div>
</div>

<!-- DRIVER -->

<div class="section">
<h2>8. Водій</h2>

<div class="grid">

<div class="field">
<label>ПІБ</label>
<input id="driver_person">
</div>

<div class="field">
<label>ІПН</label>
<input id="driver_id">
</div>

<div class="field">
<label>Посада</label>
<input id="driver_name" value="Водій">
</div>

</div>
</div>

<!-- ITEMS -->

<div class="section">

<h2>9. Товари</h2>

<div id="items-container"></div>

<button class="btn-success" onclick="addItem()">
+ Додати товар
</button>

</div>

<!-- BUTTONS -->

<div class="buttons">

<button class="btn-primary" onclick="generateJSON()">
СФОРМУВАТИ JSON
</button>

<button class="btn-success" onclick="copyJSON()">
КОПІЮВАТИ
</button>

<button class="btn-success" onclick="downloadJSON()">
СКАЧАТИ
</button>

<button class="btn-danger" onclick="clearForm()">
ОЧИСТИТИ
</button>

</div>

<pre id="json-output"></pre>

</div>

<script>

document.getElementById('doc_date').value =
new Date().toISOString().slice(0,16);

function uuid(){
    return crypto.randomUUID();
}

function val(id){
    return document.getElementById(id).value.trim();
}

function addIf(obj,key,value){

    if(
        value !== "" &&
        value !== null &&
        value !== undefined &&
        !(typeof value === 'number' && isNaN(value))
    ){
        obj[key]=value;
    }
}

function wrapValue(value){

    if(
        value === "" ||
        value === null ||
        value === undefined
    ){
        return undefined;
    }

    return { value:value };
}

function addItem(){

    const div=document.createElement('div');

    div.className='item-card';

    div.innerHTML=`

    <button class="remove-btn" onclick="this.parentElement.remove()">X</button>

    <div class="grid">

        <div class="field">
            <label>Назва товару</label>
            <input class="itm-name">
        </div>

        <div class="field">
            <label>Кількість</label>
            <input type="number" class="itm-qty">
        </div>

        <div class="field">
            <label>Вага</label>
            <input type="number" step="0.001" class="itm-weight">
        </div>

        <div class="field">
            <label>Тип упаковки</label>
            <input class="itm-unit" value="GL">
        </div>

        <div class="field">
            <label>Сума</label>
            <input type="number" class="itm-price">
        </div>

    </div>
    `;

    document.getElementById('items-container').appendChild(div);
}

addItem();

function generateJSON(){

    const payload={

        ttn_type:"generic",
        schema_version:2
    };

    // ==========================
    // ExchangedDocument
    // ==========================

    const exchanged={};

    addIf(exchanged,"ID", val('doc_id') || uuid());

    if(val('doc_date')){
        addIf(
            exchanged,
            "IssueDateTime",
            new Date(val('doc_date')).toISOString()
        );
    }

    if(val('issue_desc')){

        exchanged.IssueLogisticsLocation={};

        addIf(
            exchanged.IssueLogisticsLocation,
            "Name",
            "Пункт оформлення"
        );

        addIf(
            exchanged.IssueLogisticsLocation,
            "Description",
            val('issue_desc')
        );
    }

    addIf(
        exchanged,
        "GrossWeightMeasureText",
        wrapValue(val('weight_text'))
    );

    addIf(
        exchanged,
        "AssociatedInvoiceAmountText",
        wrapValue(val('amount_text'))
    );

    addIf(
        exchanged,
        "ConsignmentItemQuantityText",
        wrapValue(val('qty_text'))
    );

    if(val('vat_amount')){
        addIf(
            exchanged,
            "VatAmount",
            wrapValue(parseFloat(val('vat_amount')))
        );
    }

    addIf(
        exchanged,
        "VatAmountText",
        wrapValue(val('vat_text'))
    );

    if(val('truck_length')){
        addIf(
            exchanged,
            "VehicleLength",
            wrapValue(parseFloat(val('truck_length')))
        );
    }

    if(val('truck_width')){
        addIf(
            exchanged,
            "VehicleWidth",
            wrapValue(parseFloat(val('truck_width')))
        );
    }

    if(val('truck_height')){
        addIf(
            exchanged,
            "VehicleHeight",
            wrapValue(parseFloat(val('truck_height')))
        );
    }

    if(val('truck_weight')){
        addIf(
            exchanged,
            "GrossVehicleWeightWithCargo",
            wrapValue(parseFloat(val('truck_weight')))
        );
    }

    payload.ExchangedDocument=exchanged;

    // ==========================
    // Consignment
    // ==========================

    const consignment={};

    // Customer

    if(val('customer_name')){

        consignment.CustomerTradeParty={};

        addIf(
            consignment.CustomerTradeParty,
            "Name",
            val('customer_name')
        );
    }

    // Consignor

    if(
        val('consignor_name') ||
        val('consignor_id')
    ){

        consignment.ConsignorTradeParty={};

        addIf(
            consignment.ConsignorTradeParty,
            "Name",
            val('consignor_name')
        );

        addIf(
            consignment.ConsignorTradeParty,
            "ID",
            val('consignor_id')
        );

        addIf(
            consignment.ConsignorTradeParty,
            "RoleCode",
            "CZ"
        );
    }

    // Consignee

    if(
        val('consignee_name') ||
        val('consignee_id')
    ){

        consignment.ConsigneeTradeParty={};

        addIf(
            consignment.ConsigneeTradeParty,
            "Name",
            val('consignee_name')
        );

        addIf(
            consignment.ConsigneeTradeParty,
            "ID",
            val('consignee_id')
        );

        addIf(
            consignment.ConsigneeTradeParty,
            "RoleCode",
            "CN"
        );
    }

    // Carrier

    if(
        val('carrier_name') ||
        val('carrier_id')
    ){

        consignment.CarrierTradeParty={};

        addIf(
            consignment.CarrierTradeParty,
            "Name",
            val('carrier_name')
        );

        addIf(
            consignment.CarrierTradeParty,
            "ID",
            val('carrier_id')
        );

        addIf(
            consignment.CarrierTradeParty,
            "SpecifiedTaxRegistration",
            val('carrier_id')
        );

        addIf(
            consignment.CarrierTradeParty,
            "SpecifiedGovernmentRegistration",
            val('carrier_license')
        );

        addIf(
            consignment.CarrierTradeParty,
            "RoleCode",
            "CA"
        );
    }

    // Load

    if(
        val('load_name') ||
        val('load_desc')
    ){

        consignment.CarrierAcceptanceLogisticsLocation={};

        addIf(
            consignment.CarrierAcceptanceLogisticsLocation,
            "Name",
            val('load_name')
        );

        addIf(
            consignment.CarrierAcceptanceLogisticsLocation,
            "Description",
            val('load_desc')
        );
    }

    // Unload

    if(
        val('unload_name') ||
        val('unload_desc')
    ){

        consignment.ConsigneeReceiptLogisticsLocation={};

        addIf(
            consignment.ConsigneeReceiptLogisticsLocation,
            "Name",
            val('unload_name')
        );

        addIf(
            consignment.ConsigneeReceiptLogisticsLocation,
            "Description",
            val('unload_desc')
        );
    }

    // Truck

    if(
        val('truck_id') ||
        val('truck_brand') ||
        val('truck_model')
    ){

        consignment.TransportEquipmentTruck={};

        addIf(
            consignment.TransportEquipmentTruck,
            "ID",
            val('truck_id')
        );

        addIf(
            consignment.TransportEquipmentTruck,
            "Brand",
            val('truck_brand')
        );

        addIf(
            consignment.TransportEquipmentTruck,
            "Model",
            val('truck_model')
        );
    }

    // Driver

    if(
        val('driver_person') ||
        val('driver_id')
    ){

        consignment.DeliveryTransportEvent={
            DriverTradeParty:[{}]
        };

        const driver=
            consignment.DeliveryTransportEvent
            .DriverTradeParty[0];

        addIf(driver,"ID",val('driver_id'));

        addIf(driver,"Name",val('driver_name'));

        addIf(driver,"PersonName",val('driver_person'));

        addIf(driver,"RoleCode","DR");
    }

    // Items

    const items=[];

    document.querySelectorAll('.item-card').forEach((card,index)=>{

        const item={};

        const name=
            card.querySelector('.itm-name').value.trim();

        if(!name){
            return;
        }

        addIf(item,"SequenceNumeric",index+1);

        addIf(
            item,
            "NatureIdentificationTransportCargo",
            name
        );

        const weight=
            card.querySelector('.itm-weight').value;

        if(weight){
            addIf(
                item,
                "GrossWeightMeasure",
                parseFloat(weight)
            );
        }

        const price=
            card.querySelector('.itm-price').value;

        if(price){
            addIf(
                item,
                "DeclaredStatisticsValueAmount",
                parseFloat(price)
            );
        }

        const pkg={};

        const qty=
            card.querySelector('.itm-qty').value;

        if(qty){
            addIf(
                pkg,
                "ItemQuantity",
                parseInt(qty)
            );
        }

        const unit=
            card.querySelector('.itm-unit').value.trim();

        addIf(pkg,"TypeCode",unit);

        if(Object.keys(pkg).length){
            item.TransportLogisticsPackage=pkg;
        }

        items.push(item);

    });

    if(items.length){
        consignment.SupplyChainItems=items;
    }

    payload.SpecifiedSupplyChainConsignment=
        consignment;

    const out=
        document.getElementById('json-output');

    out.textContent=
        JSON.stringify(payload,null,2);

    localStorage.setItem(
        'ettn_draft',
        out.textContent
    );
}

function copyJSON(){

    navigator.clipboard.writeText(
        document.getElementById('json-output').textContent
    );

    alert('JSON скопійовано');
}

function downloadJSON(){

    const blob=new Blob(
        [
            document.getElementById('json-output').textContent
        ],
        {
            type:'application/json'
        }
    );

    const a=document.createElement('a');

    a.href=URL.createObjectURL(blob);

    a.download='ettn.json';

    a.click();
}

function clearForm(){

    if(confirm('Очистити форму?')){

        localStorage.removeItem('ettn_draft');

        location.reload();
    }
}

</script>

</body>
</html>
