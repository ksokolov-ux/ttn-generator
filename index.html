<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>eTTN JSON Generator</title>

<style>

:root{
    --primary:#1a73e8;
    --bg:#f4f7fb;
    --border:#dce3ea;
    --success:#188038;
    --danger:#d93025;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    background:var(--bg);
    font-family:Segoe UI,sans-serif;
}

.container{
    max-width:1500px;
    margin:auto;
    background:white;
    border-radius:12px;
    padding:25px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
}

h1{
    text-align:center;
    color:var(--primary);
    margin-bottom:30px;
}

.section{
    margin-top:25px;
    border:1px solid var(--border);
    border-radius:10px;
    padding:20px;
    background:#fafcff;
}

.section h2{
    margin-top:0;
    color:var(--primary);
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:15px;
}

.field{
    display:flex;
    flex-direction:column;
}

label{
    font-size:12px;
    font-weight:600;
    margin-bottom:5px;
    color:#5f6368;
}

input, textarea{
    padding:10px;
    border:1px solid var(--border);
    border-radius:6px;
    font-size:14px;
}

.item-card{
    border:1px solid var(--border);
    border-radius:8px;
    padding:15px;
    margin-bottom:15px;
    background:white;
    position:relative;
}

.remove-btn{
    position:absolute;
    right:10px;
    top:10px;
    background:var(--danger);
    color:white;
    border:none;
    border-radius:5px;
    padding:5px 10px;
    cursor:pointer;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:25px;
}

button{
    border:none;
    border-radius:6px;
    padding:12px 18px;
    font-weight:700;
    cursor:pointer;
}

.btn-primary{
    background:var(--primary);
    color:white;
}

.btn-success{
    background:var(--success);
    color:white;
}

.btn-danger{
    background:var(--danger);
    color:white;
}

#json-output{
    margin-top:30px;
    background:#111827;
    color:#9effa1;
    border-radius:10px;
    padding:20px;
    white-space:pre-wrap;
    overflow:auto;
    max-height:800px;
    font-family:Consolas, monospace;
}

</style>
</head>
<body>

<div class="container">

<h1>📦 eTTN JSON Generator</h1>

<!-- DOCUMENT -->

<div class="section">
<h2>1. ExchangedDocument</h2>

<div class="grid">

<div class="field">
<label>ID документа</label>
<input id="doc_id">
</div>

<div class="field">
<label>Дата документа</label>
<input type="datetime-local" id="doc_date">
</div>

<div class="field">
<label>Адреса оформлення</label>
<input id="issue_desc">
</div>

<div class="field">
<label>Вага словами</label>
<input id="weight_text">
</div>

<div class="field">
<label>Сума словами</label>
<input id="amount_text">
</div>

<div class="field">
<label>Кількість місць словами</label>
<input id="qty_text">
</div>

<div class="field">
<label>ПДВ</label>
<input type="number" id="vat_amount">
</div>

<div class="field">
<label>ПДВ словами</label>
<input id="vat_text">
</div>

<div class="field">
<label>Довжина авто</label>
<input type="number" step="0.01" id="truck_length">
</div>

<div class="field">
<label>Ширина авто</label>
<input type="number" step="0.01" id="truck_width">
</div>

<div class="field">
<label>Висота авто</label>
<input type="number" step="0.01" id="truck_height">
</div>

<div class="field">
<label>Маса авто</label>
<input type="number" step="0.01" id="truck_weight">
</div>

</div>
</div>

<!-- CUSTOMER -->

<div class="section">
<h2>2. Замовник</h2>

<div class="grid">

<div class="field">
<label>ID замовника</label>
<input id="customer_id">
</div>

<div class="field">
<label>Назва замовника</label>
<input id="customer_name">
</div>

</div>
</div>

<!-- CONSIGNOR -->

<div class="section">
<h2>3. Вантажовідправник</h2>

<div class="grid">

<div class="field">
<label>ЄДРПОУ</label>
<input id="consignor_id">
</div>

<div class="field">
<label>Назва</label>
<input id="consignor_name">
</div>

</div>
</div>

<!-- CONSIGNEE -->

<div class="section">
<h2>4. Вантажоотримувач</h2>

<div class="grid">

<div class="field">
<label>ЄДРПОУ</label>
<input id="consignee_id">
</div>

<div class="field">
<label>Назва</label>
<input id="consignee_name">
</div>

</div>
</div>

<!-- CARRIER -->

<div class="section">
<h2>5. Перевізник</h2>

<div class="grid">

<div class="field">
<label>ЄДРПОУ</label>
<input id="carrier_id">
</div>

<div class="field">
<label>Назва</label>
<input id="carrier_name">
</div>

<div class="field">
<label>Ліцензія</label>
<input id="carrier_license">
</div>

</div>
</div>

<!-- LOCATIONS -->

<div class="section">
<h2>6. Локації</h2>

<div class="grid">

<div class="field">
<label>ID точки завантаження</label>
<input id="load_id">
</div>

<div class="field">
<label>Назва точки завантаження</label>
<input id="load_name">
</div>

<div class="field">
<label>Адреса завантаження</label>
<input id="load_desc">
</div>

<div class="field">
<label>ID точки розвантаження</label>
<input id="unload_id">
</div>

<div class="field">
<label>Назва точки розвантаження</label>
<input id="unload_name">
</div>

<div class="field">
<label>Адреса розвантаження</label>
<input id="unload_desc">
</div>

</div>
</div>

<!-- TRUCK -->

<div class="section">
<h2>7. Автомобіль</h2>

<div class="grid">

<div class="field">
<label>Номер авто</label>
<input id="truck_id">
</div>

<div class="field">
<label>Марка</label>
<input id="truck_brand">
</div>

<div class="field">
<label>Модель</label>
<input id="truck_model">
</div>

</div>
</div>

<!-- DRIVER -->

<div class="section">
<h2>8. Водій</h2>

<div class="grid">

<div class="field">
<label>ІПН</label>
<input id="driver_id">
</div>

<div class="field">
<label>ПІБ</label>
<input id="driver_person">
</div>

<div class="field">
<label>Посада</label>
<input id="driver_name" value="Водій">
</div>

</div>
</div>

<!-- ITEMS -->

<div class="section">

<h2>9. Товари</h2>

<div id="items-container"></div>

<button class="btn-success" onclick="addItem()">
+ Додати товар
</button>

</div>

<!-- BUTTONS -->

<div class="buttons">

<button class="btn-primary" onclick="generateJSON()">
СФОРМУВАТИ JSON
</button>

<button class="btn-success" onclick="copyJSON()">
КОПІЮВАТИ
</button>

<button class="btn-success" onclick="downloadJSON()">
СКАЧАТИ
</button>

<button class="btn-danger" onclick="clearForm()">
ОЧИСТИТИ
</button>

</div>

<pre id="json-output"></pre>

</div>

<script>

document.getElementById('doc_date').value =
new Date().toISOString().slice(0,16);

function val(id){
    return document.getElementById(id).value.trim();
}

function clean(obj){

    if(Array.isArray(obj)){

        const arr = obj
            .map(clean)
            .filter(v => v !== undefined);

        return arr.length ? arr : undefined;
    }

    if(obj !== null && typeof obj === 'object'){

        const newObj = {};

        Object.keys(obj).forEach(key => {

            const cleaned = clean(obj[key]);

            if(cleaned !== undefined){
                newObj[key] = cleaned;
            }
        });

        return Object.keys(newObj).length
            ? newObj
            : undefined;
    }

    if(
        obj === undefined ||
        obj === null ||
        obj === ''
    ){
        return undefined;
    }

    return obj;
}

function addItem(){

    const div = document.createElement('div');

    div.className = 'item-card';

    div.innerHTML = `

    <button class="remove-btn" onclick="this.parentElement.remove()">X</button>

    <div class="grid">

        <div class="field">
            <label>Назва товару</label>
            <input class="itm-name">
        </div>

        <div class="field">
            <label>Кількість</label>
            <input type="number" class="itm-qty">
        </div>

        <div class="field">
            <label>Вага</label>
            <input type="number" step="0.001" class="itm-weight">
        </div>

        <div class="field">
            <label>Тип упаковки</label>
            <input class="itm-unit" value="GL">
        </div>

        <div class="field">
            <label>Сума</label>
            <input type="number" class="itm-price">
        </div>

    </div>
    `;

    document.getElementById('items-container').appendChild(div);
}

addItem();

function generateJSON(){

    const items = [];

    document.querySelectorAll('.item-card').forEach((card,index)=>{

        const item = clean({

            SequenceNumeric: index + 1,

            NatureIdentificationTransportCargo:
                card.querySelector('.itm-name').value,

            GrossWeightMeasure:
                card.querySelector('.itm-weight').value
                    ? parseFloat(
                        card.querySelector('.itm-weight').value
                    )
                    : undefined,

            DeclaredStatisticsValueAmount:
                card.querySelector('.itm-price').value
                    ? parseFloat(
                        card.querySelector('.itm-price').value
                    )
                    : undefined,

            TransportLogisticsPackage: {

                ItemQuantity:
                    card.querySelector('.itm-qty').value
                        ? parseInt(
                            card.querySelector('.itm-qty').value
                        )
                        : undefined,

                TypeCode:
                    card.querySelector('.itm-unit').value
            }
        });

        if(item){
            items.push(item);
        }
    });

    const payload = clean({

        ttn_type: "generic",

        schema_version: 2,

        ExchangedDocument: {

            ID:
                val('doc_id'),

            IssueDateTime:
                val('doc_date')
                    ? new Date(
                        val('doc_date')
                    ).toISOString()
                    : undefined,

            IssueLogisticsLocation: {

                Name:
                    "Пункт оформлення",

                Description:
                    val('issue_desc')
            },

            GrossWeightMeasureText:
                val('weight_text')
                    ? {
                        value:
                            val('weight_text')
                    }
                    : undefined,

            AssociatedInvoiceAmountText:
                val('amount_text')
                    ? {
                        value:
                            val('amount_text')
                    }
                    : undefined,

            ConsignmentItemQuantityText:
                val('qty_text')
                    ? {
                        value:
                            val('qty_text')
                    }
                    : undefined,

            VatAmount:
                val('vat_amount')
                    ? {
                        value:
                            parseFloat(
                                val('vat_amount')
                            )
                    }
                    : undefined,

            VatAmountText:
                val('vat_text')
                    ? {
                        value:
                            val('vat_text')
                    }
                    : undefined,

            VehicleLength:
                val('truck_length')
                    ? {
                        value:
                            parseFloat(
                                val('truck_length')
                            )
                    }
                    : undefined,

            VehicleWidth:
                val('truck_width')
                    ? {
                        value:
                            parseFloat(
                                val('truck_width')
                            )
                    }
                    : undefined,

            VehicleHeight:
                val('truck_height')
                    ? {
                        value:
                            parseFloat(
                                val('truck_height')
                            )
                    }
                    : undefined,

            GrossVehicleWeightWithCargo:
                val('truck_weight')
                    ? {
                        value:
                            parseFloat(
                                val('truck_weight')
                            )
                    }
                    : undefined
        },

        SpecifiedSupplyChainConsignment: {

            CustomerTradeParty: {

                ID:
                    val('customer_id'),

                Name:
                    val('customer_name')
            },

            ConsignorTradeParty: {

                ID:
                    val('consignor_id'),

                Name:
                    val('consignor_name'),

                RoleCode:
                    "CZ"
            },

            ConsigneeTradeParty: {

                ID:
                    val('consignee_id'),

                Name:
                    val('consignee_name'),

                RoleCode:
                    "CN"
            },

            CarrierTradeParty: {

                ID:
                    val('carrier_id'),

                Name:
                    val('carrier_name'),

                SpecifiedTaxRegistration:
                    val('carrier_id'),

                SpecifiedGovernmentRegistration:
                    val('carrier_license'),

                RoleCode:
                    "CA"
            },

            CarrierAcceptanceLogisticsLocation: {

                ID:
                    val('load_id'),

                Name:
                    val('load_name'),

                Description:
                    val('load_desc')
            },

            ConsigneeReceiptLogisticsLocation: {

                ID:
                    val('unload_id'),

                Name:
                    val('unload_name'),

                Description:
                    val('unload_desc')
            },

            TransportEquipmentTruck: {

                ID:
                    val('truck_id'),

                Brand:
                    val('truck_brand'),

                Model:
                    val('truck_model')
            },

            DeliveryTransportEvent: {

                DriverTradeParty: [

                    clean({

                        ID:
                            val('driver_id'),

                        Name:
                            val('driver_name'),

                        PersonName:
                            val('driver_person'),

                        RoleCode:
                            "DR"
                    })
                ]
            },

            SupplyChainItems:
                items
        }
    });

    document.getElementById(
        'json-output'
    ).textContent =
        JSON.stringify(payload,null,2);
}

function copyJSON(){

    navigator.clipboard.writeText(
        document.getElementById('json-output').textContent
    );

    alert('JSON скопійовано');
}

function downloadJSON(){

    const blob = new Blob(
        [
            document.getElementById('json-output').textContent
        ],
        {
            type:'application/json'
        }
    );

    const a = document.createElement('a');

    a.href = URL.createObjectURL(blob);

    a.download = 'ettn.json';

    a.click();
}

function clearForm(){

    if(confirm('Очистити форму?')){
        location.reload();
    }
}

</script>

</body>
</html>
