<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор еТТН для Вчасно</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; color: #333; line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 30px; }
        h2 { background: #e8f0fe; padding: 10px; border-radius: 6px; font-size: 1.1em; color: #1967d2; margin-top: 25px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .field-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9em; }
        input { width: 100%; padding: 10px; border: 1px solid #dadce0; border-radius: 6px; box-sizing: border-box; transition: border 0.3s; }
        input:focus { border-color: #1a73e8; outline: none; }
        .btn-area { text-align: center; margin-top: 30px; }
        button { background-color: #1a73e8; color: white; padding: 15px 40px; border: none; border-radius: 8px; font-size: 1em; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #1557b0; }
        #json-output { background: #202124; color: #f1f3f4; padding: 20px; border-radius: 8px; margin-top: 30px; white-space: pre-wrap; font-family: 'Courier New', Courier, monospace; font-size: 0.9em; display: none; overflow-x: auto; }
        .copy-btn { background: #5f6368; margin-top: 10px; padding: 8px 15px; font-size: 0.8em; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Генератор еТТН (Вчасно API)</h1>
    
    <h2>1. Основна інформація про документ</h2>
    <div class="grid">
        <div class="field-group">
            <label>Номер ТТН (ID):</label>
            <input type="text" id="doc_id" value="TTN-TEST-01">
        </div>
        <div class="field-group">
            <label>Дата та час (ISO):</label>
            <input type="text" id="doc_date" value="2026-05-13T12:00:00Z">
        </div>
    </div>

    <h2>2. Сторони (ЄДРПОУ та Назви)</h2>
    <div class="grid">
        <div class="field-group">
            <label>Відправник (Назва):</label>
            <input type="text" id="consignor_name" value="Вантажовідправник ТОВ">
        </div>
        <div class="field-group">
            <label>Відправник (ЄДРПОУ):</label>
            <input type="text" id="consignor_id" value="55555555">
        </div>
        <div class="field-group">
            <label>Отримувач (Назва):</label>
            <input type="text" id="consignee_name" value="Вантажоотримувач ТОВ">
        </div>
        <div class="field-group">
            <label>Отримувач (ЄДРПОУ):</label>
            <input type="text" id="consignee_id" value="77777777">
        </div>
    </div>

    <h2>3. Транспорт та Перевізник</h2>
    <div class="grid">
        <div class="field-group">
            <label>Назва перевізника:</label>
            <input type="text" id="carrier_name" value="Перевізник ТОВ">
        </div>
        <div class="field-group">
            <label>ЄДРПОУ перевізника:</label>
            <input type="text" id="carrier_id" value="3462202332">
        </div>
        <div class="field-group">
            <label>Водій (ПІБ):</label>
            <input type="text" id="driver_name" value="Шевченко Василь Ігнатович">
        </div>
        <div class="field-group">
            <label>Держномер авто (ID):</label>
            <input type="text" id="truck_id" value="AA1111ББ">
        </div>
        <div class="field-group">
            <label>Марка авто:</label>
            <input type="text" id="truck_brand" value="Mercedes">
        </div>
        <div class="field-group">
            <label>Модель:</label>
            <input type="text" id="truck_model" value="Vito">
        </div>
    </div>

    <h2>4. Характеристики вантажу</h2>
    <div class="grid">
        <div class="field-group">
            <label>Назва товару:</label>
            <input type="text" id="item_name" value="Молоко">
        </div>
        <div class="field-group">
            <label>Загальна вага (кг):</label>
            <input type="number" id="total_weight" value="100">
        </div>
        <div class="field-group">
            <label>Кількість пакунків:</label>
            <input type="number" id="item_qty" value="5">
        </div>
        <div class="field-group">
            <label>Одиниця виміру (код):</label>
            <input type="text" id="item_unit_code" value="GL">
        </div>
    </div>

    <div class="btn-area">
        <button onclick="generateJSON()">Сформувати JSON</button>
    </div>

    <pre id="json-output"></pre>
    <button class="copy-btn" id="copy-btn" onclick="copyToClipboard()">📋 Копіювати в буфер</button>
</div>

<script>
    function generateJSON() {
        const data = {
            "ExchangedDocument": {
                "ID": document.getElementById('doc_id').value,
                "IssueDateTime": document.getElementById('doc_date').value,
                "IssueLogisticsLocation": {
                    "Name": "Київ",
                    "Description": "Пункт оформлення"
                }
            },
            "SpecifiedSupplyChainConsignment": {
                "CarrierTradeParty": {
                    "DefinedTradeContact": {
                        "PersonName": document.getElementById('driver_name').value
                    },
                    "SpecifiedTaxRegistration": document.getElementById('carrier_id').value,
                    "SpecifiedGovernmentRegistration": "СТГ746312",
                    "ID": document.getElementById('carrier_id').value,
                    "Name": document.getElementById('carrier_name').value
                },
                "TransportEquipmentTruck": {
                    "Brand": document.getElementById('truck_brand').value,
                    "Model": document.getElementById('truck_model').value,
                    "ID": document.getElementById('truck_id').value
                },
                "ConsignorTradeParty": {
                    "ID": document.getElementById('consignor_id').value,
                    "Name": document.getElementById('consignor_name').value
                },
                "ConsigneeTradeParty": {
                    "ID": document.getElementById('consignee_id').value,
                    "Name": document.getElementById('consignee_name').value
                },
                "GrossWeightMeasure": parseFloat(document.getElementById('total_weight').value),
                "SupplyChainItems": [
                    {
                        "SequenceNumeric": 1,
                        "NatureIdentificationTransportCargo": document.getElementById('item_name').value,
                        "GrossWeightMeasure": parseFloat(document.getElementById('total_weight').value) / 2,
                        "TransportLogisticsPackage": {
                            "Type": "од",
                            "ItemQuantity": parseInt(document.getElementById('item_qty').value),
                            "TypeCode": document.getElementById('item_unit_code').value
                        }
                    }
                ]
            }
        };

        const output = document.getElementById('json-output');
        const copyBtn = document.getElementById('copy-btn');
        
        output.innerText = JSON.stringify(data, null, 2);
        output.style.display = 'block';
        copyBtn.style.display = 'inline-block';
        
        window.scrollTo(0, document.body.scrollHeight);
    }

    function copyToClipboard() {
        const text = document.getElementById('json-output').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert('JSON скопійовано!');
        });
    }
</script>

</body>
</html>
