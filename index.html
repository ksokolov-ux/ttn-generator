<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор еТТН (Повна структура)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; padding: 20px; color: #202124; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; }
        h2 { background: #f1f3f4; padding: 10px; border-radius: 6px; font-size: 1em; color: #3c4043; margin-top: 20px; border-left: 5px solid #1a73e8; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .field-group { margin-bottom: 10px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.85em; color: #5f6368; }
        input { width: 100%; padding: 8px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; }
        input:focus { border-color: #1a73e8; outline: none; background: #fdfdfd; }
        .btn-area { text-align: center; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        button { background-color: #1a73e8; color: white; padding: 12px 30px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
        #json-output { background: #202124; color: #a8ffaa; padding: 20px; border-radius: 8px; margin-top: 20px; white-space: pre-wrap; font-family: monospace; font-size: 0.85em; display: none; }
        .copy-btn { background: #34a853; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Повний Генератор еТТН</h1>
    
    <h2>1. Документ та Локація складання</h2>
    <div class="grid">
        <div class="field-group"><label>Номер ТТН (ID):</label><input type="text" id="doc_id" placeholder="Наприклад: 123"></div>
        <div class="field-group"><label>Дата (ISO 8601):</label><input type="text" id="doc_date" placeholder="2026-05-13T12:00:00Z"></div>
        <div class="field-group"><label>Місто складання:</label><input type="text" id="issue_city" placeholder="Київ"></div>
    </div>

    <h2>2. Сторони (Вантажовідправник та Отримувач)</h2>
    <div class="grid">
        <div class="field-group"><label>Відправник (Назва):</label><input type="text" id="cz_name" placeholder=""></div>
        <div class="field-group"><label>Відправник (ЄДРПОУ):</label><input type="text" id="cz_id" placeholder=""></div>
        <div class="field-group"><label>Відправник (ПІБ відп. особи):</label><input type="text" id="cz_person" placeholder=""></div>
        
        <div class="field-group"><label>Отримувач (Назва):</label><input type="text" id="cn_name" placeholder=""></div>
        <div class="field-group"><label>Отримувач (ЄДРПОУ):</label><input type="text" id="cn_id" placeholder=""></div>
        <div class="field-group"><label>Отримувач (ПІБ відп. особи):</label><input type="text" id="cn_person" placeholder=""></div>
    </div>

    <h2>3. Перевізник, Водій та Авто</h2>
    <div class="grid">
        <div class="field-group"><label>Перевізник (Назва):</label><input type="text" id="ca_name" placeholder=""></div>
        <div class="field-group"><label>Перевізник (ЄДРПОУ):</label><input type="text" id="ca_id" placeholder=""></div>
        <div class="field-group"><label>Ліцензія перевізника:</label><input type="text" id="ca_gov_reg" placeholder=""></div>
        
        <div class="field-group"><label>Водій (ПІБ):</label><input type="text" id="dr_name" placeholder=""></div>
        <div class="field-group"><label>Водій (ІПН/ID):</label><input type="text" id="dr_id" placeholder=""></div>
        <div class="field-group"><label>Держномер авто:</label><input type="text" id="truck_id" placeholder=""></div>
        <div class="field-group"><label>Марка/Модель авто:</label><input type="text" id="truck_brand" placeholder=""></div>
    </div>

    <h2>4. Маршрут (Пункти навантаження / розвантаження)</h2>
    <div class="grid">
        <div class="field-group"><label>Пункт навантаження (Назва):</label><input type="text" id="load_name" placeholder=""></div>
        <div class="field-group"><label>Пункт навантаження (Адреса):</label><input type="text" id="load_addr" placeholder=""></div>
        
        <div class="field-group"><label>Пункт розвантаження (Назва):</label><input type="text" id="unload_name" placeholder=""></div>
        <div class="field-group"><label>Пункт розвантаження (Адреса):</label><input type="text" id="unload_addr" placeholder=""></div>
    </div>

    <h2>5. Вантаж (Товарна позиція)</h2>
    <div class="grid">
        <div class="field-group"><label>Назва товару:</label><input type="text" id="item_name" placeholder=""></div>
        <div class="field-group"><label>Вага брутто (кг):</label><input type="number" id="item_weight" step="0.01" placeholder="0.00"></div>
        <div class="field-group"><label>Кількість:</label><input type="number" id="item_qty" placeholder="0"></div>
        <div class="field-group"><label>Одиниця виміру (напр. шт, кг):</label><input type="text" id="item_unit" placeholder="шт"></div>
    </div>

    <div class="btn-area">
        <button onclick="generateFullJSON()">Згенерувати JSON</button>
        <button class="copy-btn" id="copy-btn" style="display:none" onclick="copyText()">Копіювати JSON</button>
    </div>

    <pre id="json-output"></pre>
</div>

<script>
    function generateFullJSON() {
        const fullData = {
            "ttn_type": "generic",
            "schema_version": 1,
            "ExchangedDocument": {
                "ID": document.getElementById('doc_id').value,
                "IssueDateTime": document.getElementById('doc_date').value,
                "IssueLogisticsLocation": {
                    "Name": document.getElementById('issue_city').value
                }
            },
            "SpecifiedSupplyChainConsignment": {
                "ConsignorTradeParty": {
                    "ID": document.getElementById('cz_id').value,
                    "Name": document.getElementById('cz_name').value,
                    "DefinedTradeContact": { "PersonName": document.getElementById('cz_person').value }
                },
                "ConsigneeTradeParty": {
                    "ID": document.getElementById('cn_id').value,
                    "Name": document.getElementById('cn_name').value,
                    "DefinedTradeContact": { "PersonName": document.getElementById('cn_person').value }
                },
                "CarrierTradeParty": {
                    "ID": document.getElementById('ca_id').value,
                    "Name": document.getElementById('ca_name').value,
                    "SpecifiedGovernmentRegistration": document.getElementById('ca_gov_reg').value
                },
                "TransportEquipmentTruck": {
                    "ID": document.getElementById('truck_id').value,
                    "Brand": document.getElementById('truck_brand').value
                },
                "CarrierAcceptanceLogisticsLocation": {
                    "Name": document.getElementById('load_name').value,
                    "Description": document.getElementById('load_addr').value,
                    "TypeCode": 10
                },
                "ConsigneeReceiptLogisticsLocation": {
                    "Name": document.getElementById('unload_name').value,
                    "Description": document.getElementById('unload_addr').value,
                    "TypeCode": 5
                },
                "DeliveryTransportEvent": {
                    "DriverTradeParty": [{
                        "ID": document.getElementById('dr_id').value,
                        "PersonName": document.getElementById('dr_name').value
                    }]
                },
                "SupplyChainItems": [{
                    "SequenceNumeric": 1,
                    "NatureIdentificationTransportCargo": document.getElementById('item_name').value,
                    "GrossWeightMeasure": parseFloat(document.getElementById('item_weight').value || 0),
                    "TransportLogisticsPackage": {
                        "ItemQuantity": parseInt(document.getElementById('item_qty').value || 0),
                        "Type": document.getElementById('item_unit').value
                    }
                }]
            }
        };

        const out = document.getElementById('json-output');
        out.innerText = JSON.stringify(fullData, null, 2);
        out.style.display = 'block';
        document.getElementById('copy-btn').style.display = 'inline-block';
    }

    function copyText() {
        navigator.clipboard.writeText(document.getElementById('json-output').innerText);
        alert("Скопійовано!");
    }
</script>

</body>
</html>
