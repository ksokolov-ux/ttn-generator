<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор еТТН Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f4f8; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 30px; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        h2 { background: #1a73e8; color: white; padding: 8px 15px; border-radius: 6px; font-size: 1em; margin-top: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .field-group { display: flex; flex-direction: column; }
        label { font-weight: 600; margin-bottom: 5px; font-size: 0.85em; color: #5f6368; }
        input { padding: 12px; border: 1px solid #dadce0; border-radius: 8px; font-size: 1em; }
        .item-card { background: #f8f9fa; border: 1px solid #e8eaed; padding: 20px; border-radius: 10px; margin-bottom: 15px; }
        .item-card h3 { margin-top: 0; font-size: 0.9em; color: #1a73e8; text-transform: uppercase; }
        .btn-add { background: #34a853; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 20px 0; }
        .btn-generate { background: #1a73e8; color: white; padding: 15px 40px; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; cursor: pointer; width: 100%; }
        #json-output { background: #202124; color: #34d399; padding: 20px; border-radius: 10px; margin-top: 20px; white-space: pre-wrap; font-family: monospace; display: none; }
        .copy-btn { background: #5f6368; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Генератор еТТН v2.1</h1>

    <h2>📅 Документ</h2>
    <div class="grid">
        <div class="field-group"><label>Номер ТТН (ID):</label><input type="text" id="doc_id" placeholder="TTN-001"></div>
        <div class="field-group"><label>Дата та час складання:</label><input type="datetime-local" id="doc_date"></div>
        <div class="field-group"><label>Місто складання:</label><input type="text" id="issue_city" placeholder="Київ"></div>
    </div>

    <h2>🏢 Учасники (ЄДРПОУ)</h2>
    <div class="grid">
        <div class="field-group"><label>Відправник:</label><input type="text" id="cz_id"></div>
        <div class="field-group"><label>Отримувач:</label><input type="text" id="cn_id"></div>
        <div class="field-group"><label>Перевізник:</label><input type="text" id="ca_id"></div>
    </div>

    <h2>🚚 Транспорт</h2>
    <div class="grid">
        <div class="field-group"><label>Держномер авто:</label><input type="text" id="truck_id"></div>
        <div class="field-group"><label>Водій (ПІБ):</label><input type="text" id="driver_name"></div>
    </div>

    <h2>📦 Товари</h2>
    <div id="items-container">
        <div class="item-card">
            <h3>Товар #1</h3>
            <div class="grid">
                <div class="field-group"><label>Назва:</label><input type="text" class="item-name"></div>
                <div class="field-group"><label>Вага брутто (кг):</label><input type="number" class="item-weight"></div>
                <div class="field-group"><label>Кількість:</label><input type="number" class="item-qty"></div>
            </div>
        </div>
    </div>
    
    <button type="button" class="btn-add" onclick="addItem()">+ Додати ще один товар</button>
    <button type="button" class="btn-generate" onclick="generate()">Сформувати JSON</button>

    <pre id="json-output"></pre>
    <button type="button" class="copy-btn" id="copy-btn" onclick="copyJson()">📋 Копіювати JSON</button>
</div>

<script>
    // 1. Установка даты
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('doc_date').value = now.toISOString().slice(0, 16);

    let itemCount = 1;

    // 2. Функция добавления товара (Исправлена)
    function addItem() {
        itemCount++;
        const container = document.getElementById('items-container');
        const newCard = document.createElement('div');
        newCard.className = 'item-card';
        newCard.innerHTML = `
            <h3>Товар #${itemCount}</h3>
            <div class="grid">
                <div class="field-group"><label>Назва:</label><input type="text" class="item-name"></div>
                <div class="field-group"><label>Вага брутто (кг):</label><input type="number" class="item-weight"></div>
                <div class="field-group"><label>Кількість:</label><input type="number" class="item-qty"></div>
            </div>
        `;
        container.appendChild(newCard);
    }

    // 3. Генерация JSON
    function generate() {
        const items = [];
        const itemCards = document.querySelectorAll('.item-card');
        
        itemCards.forEach((card, index) => {
            const name = card.querySelector('.item-name').value;
            const weight = card.querySelector('.item-weight').value;
            const qty = card.querySelector('.item-qty').value;

            if (name.trim() !== "") {
                items.push({
                    "SequenceNumeric": index + 1,
                    "NatureIdentificationTransportCargo": name,
                    "GrossWeightMeasure": parseFloat(weight || 0),
                    "TransportLogisticsPackage": {
                        "ItemQuantity": parseInt(qty || 0),
                        "TypeCode": "GL"
                    }
                });
            }
        });

        const localDate = document.getElementById('doc_date').value;
        const isoDate = localDate ? new Date(localDate).toISOString() : "";

        const result = {
            "ExchangedDocument": {
                "ID": document.getElementById('doc_id').value,
                "IssueDateTime": isoDate,
                "IssueLogisticsLocation": { "Name": document.getElementById('issue_city').value }
            },
            "SpecifiedSupplyChainConsignment": {
                "ConsignorTradeParty": { "ID": document.getElementById('cz_id').value },
                "ConsigneeTradeParty": { "ID": document.getElementById('cn_id').value },
                "CarrierTradeParty": { "ID": document.getElementById('ca_id').value },
                "TransportEquipmentTruck": { "ID": document.getElementById('truck_id').value },
                "DeliveryTransportEvent": {
                    "DriverTradeParty": [{ "PersonName": document.getElementById('driver_name').value }]
                },
                "SupplyChainItems": items
            }
        };

        const out = document.getElementById('json-output');
        out.innerText = JSON.stringify(result, null, 2);
        out.style.display = 'block';
        document.getElementById('copy-btn').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    function copyJson() {
        const text = document.getElementById('json-output').innerText;
        navigator.clipboard.writeText(text).then(() => alert("JSON скопійовано!"));
    }
</script>

</body>
</html>
